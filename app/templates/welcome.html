<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Medical Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
            padding: 3rem 2.8rem 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: rise 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: 3.2rem;
            margin-bottom: 1.2rem;
            display: block;
        }

        h1 {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            margin-bottom: 0.45rem;
        }

        .subtitle {
            font-size: 0.92rem;
            color: #888;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.97rem;
            font-family: inherit;
            color: #1a1a1a;
            outline: none;
            transition: border 0.2s;
            margin-bottom: 1rem;
        }
        input[type="text"]:focus { border-color: #1a1a1a; }
        input[type="text"]::placeholder { color: #bbb; }

        button {
            width: 100%;
            padding: 0.78rem;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.97rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.01em;
            transition: background 0.15s, transform 0.1s;
        }
        button:hover  { background: #333; }
        button:active { transform: scale(0.98); }

        .footer {
            margin-top: 1.6rem;
            font-size: 0.75rem;
            color: #bbb;
        }
    </style>
</head>
<body>
<div class="card">
    <span class="icon">⚕️</span>
    <h1>MedQuery</h1>
    <p class="subtitle">RAG Based Clinical Assistant<br><span style="font-size:0.8rem;color:#bbb;">by Mistral</span></p>

    <form method="post" action="{{ url_for('index') }}">
        <input
            type="text"
            name="name"
            placeholder="Your name"
            required
            autofocus
            autocomplete="off"
        />
        <button type="submit">Continue →</button>
    </form>

    <p class="footer">Powered by Mistral · RAG · FAISS</p>
</div>
</body>
</html>
